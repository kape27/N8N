version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_secure_password_123
      - POSTGRES_DB=n8n
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    build: .
    container_name: n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      # Database Configuration (PostgreSQL Local)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_secure_password_123
      - DB_POSTGRESDB_SSL=false
      - DB_POSTGRESDB_POOL_SIZE=5
      
      # Performance optimizations
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_METRICS=false
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=5
      - EXECUTIONS_TIMEOUT=300
      
      # n8n Configuration
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      
      # Authentication
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      
      # Security
      - N8N_ENCRYPTION_KEY=e4QdZxpFQoTWIN1yI8cxc1RzmV65AaYUvx864QXe5dY=
      
      # Localization
      - GENERIC_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
      - N8N_DEFAULT_LOCALE=fr
      
      # Logging
      - N8N_LOG_LEVEL=warn
      
      # Execution Data Pruning
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=24
      
      # Queue mode
      - QUEUE_HEALTH_CHECK_ACTIVE=false
    
    volumes:
      - n8n_local_data:/home/node/.n8n
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_local_data:
    driver: local
  n8n_local_data:
    driver: local
